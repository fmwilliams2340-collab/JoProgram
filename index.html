<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#102a52" />
<meta name="apple-mobile-web-app-capable" content="yes" />

<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-180.png" />
<title>Jo's Program v2.0</title>
<style>
:root{--bg:#f6f1e8;--card:#fffdf8;--ink:#1f2937;--muted:#667085;--line:rgba(31,41,55,.12);--blue:#102a52;--blue2:#2866a3;--green:#126146;--purple:#5a2d82;--rose:#9d1856;--accent:#102a52;--accent2:#2866a3;--shadow:0 14px 38px rgba(16,24,40,.12);--safe:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:radial-gradient(circle at 10% 0%,rgba(16,42,82,.14),transparent 25rem),linear-gradient(180deg,#fff9ef,var(--bg));min-height:100vh}.shell{max-width:980px;margin:0 auto;padding:14px 14px calc(96px + var(--safe))}.hero{border-radius:30px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;padding:20px;box-shadow:var(--shadow);overflow:hidden;position:relative}.hero:after{content:"";position:absolute;right:-70px;top:-80px;width:220px;height:220px;border-radius:999px;background:rgba(255,255,255,.14)}.hero-main{position:relative;z-index:1;display:grid;grid-template-columns:1fr auto;gap:16px;align-items:start}.eyebrow{display:inline-flex;border:1px solid rgba(255,255,255,.28);background:rgba(255,255,255,.14);border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900;letter-spacing:.08em;text-transform:uppercase}.hero h1{font-size:clamp(36px,9vw,62px);line-height:.92;margin:14px 0 8px;letter-spacing:-.06em}.hero p{margin:0;color:rgba(255,255,255,.9);font-size:16px;line-height:1.45}.portrait{width:104px;height:104px;border-radius:26px;overflow:hidden;border:3px solid rgba(255,255,255,.55);box-shadow:0 18px 30px rgba(0,0,0,.20);background:#fff}.portrait img{width:100%;height:100%;object-fit:cover}.quick{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px}.quick div{border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.14);border-radius:18px;padding:10px}.quick b{display:block;font-size:20px}.quick span{font-size:12px;color:rgba(255,255,255,.84);font-weight:800}.nav-wrap{position:sticky;top:0;z-index:30;margin:12px -14px 12px;padding:8px 14px;background:linear-gradient(180deg,rgba(246,241,232,.97),rgba(246,241,232,.82));backdrop-filter:blur(14px);border-bottom:1px solid rgba(31,41,55,.08)}.day-nav{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;max-width:980px;margin:auto}.tab{border:1px solid var(--line);background:rgba(255,255,255,.78);border-radius:16px;padding:10px 6px;font-weight:950;color:var(--ink);box-shadow:0 4px 10px rgba(16,24,40,.05)}.tab small{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}.tab.active{background:var(--accent);color:white}.tab.active small{color:rgba(255,255,255,.82)}.section{background:rgba(255,253,248,.94);border:1px solid rgba(31,41,55,.09);border-radius:26px;margin:14px 0;box-shadow:var(--shadow);overflow:hidden}.head{display:flex;justify-content:space-between;gap:12px;padding:15px 16px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#fff,rgba(255,255,255,.7))}.head h2,.head h3{margin:0;color:var(--accent);letter-spacing:-.02em}.head span{color:var(--muted);font-size:12px;font-weight:850;text-align:right}.day-title{padding:18px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white}.day-title h2{font-size:40px;margin:0;letter-spacing:-.04em;line-height:1;color:white}.day-title p{margin:5px 0 0;color:rgba(255,255,255,.88);font-weight:900;text-transform:uppercase;font-size:14px}.summary{padding:15px 16px;display:grid;gap:12px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.stat{border:1px solid var(--line);background:white;border-radius:18px;padding:11px}.stat b{display:block;color:var(--accent);font-size:20px}.stat span{font-size:12px;color:var(--muted);font-weight:800}.warm-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:14px}.warm{background:white;border:1px solid var(--line);border-radius:18px;padding:12px;min-height:92px}.warm b{display:block;color:var(--accent);font-size:14px}.warm span{display:block;margin-top:6px;color:var(--muted);font-size:13px;line-height:1.35}.exercise-list{display:grid;gap:12px;padding:14px}.exercise{display:grid;grid-template-columns:128px 1fr;border:1px solid var(--line);border-radius:24px;background:white;overflow:hidden}.pic{background:linear-gradient(180deg,color-mix(in srgb,var(--accent) 10%,white),white);border-right:1px solid var(--line);display:grid;place-items:center;padding:10px}.pic svg{width:100%;max-width:120px}.body{padding:13px;display:grid;gap:10px}.toprow{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start}.check{display:flex;gap:10px;align-items:flex-start}.check input{width:24px;height:24px;accent-color:var(--accent);margin-top:3px}.name{margin:0;font-size:19px;letter-spacing:-.02em}.sub{margin:3px 0 0;color:var(--muted);font-size:13px;font-weight:750}.rx{display:flex;gap:8px}.rx div{border:1px solid var(--line);border-radius:14px;padding:7px 9px;text-align:center;min-width:52px}.rx b{display:block;color:var(--accent);font-size:16px}.rx span{font-size:10px;text-transform:uppercase;color:var(--muted);font-weight:900}.cues{margin:0;padding-left:19px;color:#3f4857;font-size:14px;line-height:1.45}.track{display:grid;grid-template-columns:1fr 1fr;gap:10px;background:#faf7f0;border:1px solid rgba(31,41,55,.08);border-radius:18px;padding:10px}.field label{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;font-weight:950;letter-spacing:.04em;margin-bottom:4px}.field input,.notes textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:10px;font-size:16px;background:white;color:var(--ink)}.last{grid-column:1/-1;font-size:12px;color:var(--muted);font-weight:800}.notes{padding:14px}.notes textarea{min-height:120px;resize:vertical}.actions{display:grid;gap:10px;padding:14px}.btn{appearance:none;border:0;border-radius:18px;padding:14px 16px;font-weight:950;font-size:15px;background:var(--accent);color:white;box-shadow:0 10px 20px rgba(16,24,40,.14)}.btn.secondary{background:white;color:var(--accent);border:1px solid var(--line);box-shadow:none}.btn.danger{background:#fff;color:#a33;border:1px solid rgba(163,51,51,.25);box-shadow:none}.history{padding:14px;display:grid;gap:10px}.hist-card{background:white;border:1px solid var(--line);border-radius:18px;padding:12px}.hist-card b{color:var(--accent)}.hist-card p{margin:6px 0 0;color:var(--muted);font-size:13px}.bottom{position:fixed;left:0;right:0;bottom:0;z-index:40;padding:10px 14px calc(10px + var(--safe));background:rgba(246,241,232,.88);backdrop-filter:blur(14px);border-top:1px solid rgba(31,41,55,.08)}.bottom-inner{max-width:980px;margin:auto;display:grid;grid-template-columns:1fr 1fr;gap:10px}.toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%);background:#111827;color:white;border-radius:999px;padding:10px 14px;font-weight:800;box-shadow:0 12px 28px rgba(0,0,0,.22);opacity:0;pointer-events:none;transition:.2s;z-index:60}.toast.show{opacity:1}.update{display:none;margin-top:12px;border:1px solid rgba(255,255,255,.28);background:rgba(255,255,255,.16);border-radius:18px;padding:10px}.update.show{display:flex;gap:10px;align-items:center;justify-content:space-between}.update button{border:0;border-radius:999px;padding:8px 10px;font-weight:900;color:var(--accent);background:white}@media(max-width:720px){.shell{padding-left:10px;padding-right:10px}.hero-main{grid-template-columns:1fr auto}.portrait{width:86px;height:86px;border-radius:22px}.quick,.stats{grid-template-columns:1fr 1fr}.day-nav{gap:5px}.tab{font-size:13px}.warm-grid{grid-template-columns:1fr 1fr}.exercise{grid-template-columns:1fr}.pic{border-right:0;border-bottom:1px solid var(--line);min-height:128px}.toprow{grid-template-columns:1fr}.rx{justify-content:flex-start}.track{grid-template-columns:1fr 1fr}.day-title h2{font-size:34px}}@media(max-width:390px){.portrait{display:none}.quick{grid-template-columns:1fr}.warm-grid,.stats{grid-template-columns:1fr}.track{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="shell">
<header class="hero">
  <div class="hero-main"><div><div class="eyebrow">Version 2.0</div><h1>Jo's Program</h1><p>Strength, health, longevity, and confidence. Track the work, keep the knee calm, and leave the gym feeling better than when you walked in.</p></div><div class="portrait"><img src="icon-192.png" alt="Jo's Program icon"></div></div>
  <div class="quick"><div><b id="quickDone">0%</b><span>today complete</span></div><div><b id="quickHistory">0</b><span>logged workouts</span></div><div><b>Auto</b><span>saves on this phone</span></div></div>
  <div class="update" id="updateBox"><span>New version available.</span><button id="updateBtn">Update now</button></div>
</header>
<nav class="nav-wrap"><div class="day-nav" id="dayNav"></div></nav>
<main id="app"></main>
</div>
<div class="bottom"><div class="bottom-inner"><button class="btn secondary" id="emailBtn">Email Today's Workout</button><button class="btn" id="finishBtn">Finish Workout</button></div></div>
<div class="toast" id="toast">Saved</div>
<script>
const VERSION='2.0.0';
const STORE='jos.v2.';
const themes={monday:['#102a52','#2866a3'],tuesday:['#126146','#2d9670'],wednesday:['#5a2d82','#8c60bb'],thursday:['#4a2a7b','#7350ad'],friday:['#9d1856','#d15589']};
const program=[
{id:'monday',tab:'Mon',day:'Monday',subtitle:'Upper Body Strength',focus:'Press, pull, posture, and controlled upper-body strength.',stats:[['8','main exercises'],['60-90 sec','rest'],['10-15 min','cool-down']],warm:[['Treadmill or Rower','5 minutes easy pace'],['Band Pull-Aparts','15 smooth reps'],['Shoulder Circles','10 each direction'],['Arm Swings','20 relaxed swings']],cool:['10-15 minute treadmill walk','10-15 minute Concept2 rower'],notes:[['Keep it smooth','No grinding reps. Stop with 1-3 reps in reserve.'],['Posture matters','Shoulders down, chest tall, neck relaxed.']],ex:[['Plate-Loaded Chest Press','Stable machine press','3','8-10','chest',['Set handles around mid-chest.','Press smoothly without locking hard.','Return slowly with shoulders down.']],['Lat Pulldown','Wide or neutral grip','3','8-10','pull',['Sit tall with chest lifted.','Pull toward upper chest.','Control the return.']],['Seated Dumbbell Shoulder Press','Back-supported bench','3','8-10','press',['Use back support.','Press overhead smoothly.','Shorten range if shoulders complain.']],['Seated Row Machine','Machine preferred','3','10','row',['Sit tall.','Pull handles toward torso.','Pause, then return slowly.']],['Incline Dumbbell Press','30-45 degree bench','2','10-12','incline',['Use a modest incline.','Lower to chest level.','Press with control.']],['Seated or Machine Lateral Raise','Stable shoulder accessory','3','12-15','lateral',['Stay seated or use machine.','Raise to shoulder height.','Lower slowly.']],['Triceps Pressdown','Cable or machine','2','12-15','tri',['Elbows by sides.','Press down smoothly.','No swinging.']],['Dumbbell Curl','Seated or standing','2','12-15','curl',['Keep elbows close.','Curl with control.','Lower slowly.']]]},
{id:'tuesday',tab:'Tue',day:'Tuesday',subtitle:'Lower Body, Knee Friendly',focus:'Stable lower-body strength with controlled range and no balance test.',stats:[['7','exercises'],['Pain-free','range'],['10-15 min','cool-down']],warm:[['Treadmill or Rower','5 minutes easy pace'],['Sit-to-Stand','10 easy reps'],['Heel Raises','15 smooth reps'],['Mini Squats','10 shallow reps']],cool:['10-15 minute treadmill walk','10-15 minute Concept2 rower'],notes:[['Knee rule','No sharp pain, twisting, catching, or swelling later.'],['Stable wins','Machines and support are not cheating. They are smart.']],ex:[['Leg Press','Feet higher, comfortable depth','3','10-12','legpress',['Feet hip-width and slightly high.','Lower only as far as comfortable.','Push through midfoot and heel.']],['Romanian Deadlift','Dumbbells or Smith machine','3','8-10','rdl',['Soft knees. Hinge from hips.','Keep weights close to legs.','Stand tall by squeezing glutes.']],['Glute Bridge or Hip Thrust','Floor or bench','3','10-12','bridge',['Drive through heels.','Squeeze glutes at top.','Lower with control.']],['Seated Leg Curl','Hamstring machine','3','12','curlleg',['Adjust pad behind lower legs.','Curl heels toward seat.','Return slowly.']],['Leg Extension','Light and controlled','2','10-12','extension',['Align knee with machine pivot.','Lift smoothly.','Skip if kneecap discomfort occurs.']],['Supported Step-Up or Sit-to-Stand','Use rail or low box','2','8 each side','step',['Use a low step.','Hold support.','Step down slowly.']],['Standing Calf Raise','Hold support','2-3','12-15','calf',['Hold a stable support.','Rise onto balls of feet.','Lower slowly.']]]},
{id:'wednesday',tab:'Wed',day:'Wednesday',subtitle:'Recovery & Mobility',focus:'Optional recovery day. Easy movement, joint care, and no strain.',stats:[['Optional','recovery'],['20-30 min','easy cardio'],['Gentle','mobility']],warm:[['Easy Walk','10-20 minutes'],['Concept2 Row','10 minutes easy'],['Water','Hydrate well'],['Breathing','2 minutes relaxed']],cool:['Easy walk if desired','Stop while feeling fresh'],notes:[['No pressure','This day should help, not drain.'],['Keep it easy','Mobility should feel gentle and useful.']],ex:[['Hip Flexor Stretch','Gentle stretch','2','30 sec each','stretch',['Keep ribs down.','Tuck pelvis lightly.','No forcing.']],['Hamstring Stretch','Gentle stretch','2','30 sec each','stretch',['Sit tall.','Hinge forward gently.','Do not force knee straight.']],['Figure-4 Stretch','Hip and glute','2','30 sec each','stretch',['Keep it mild.','Breathe slowly.','Stop if knee complains.']],['Doorway Chest Stretch','Posture reset','2','30 sec','stretch',['Forearms on doorway.','Step forward gently.','No shoulder pinch.']],['Ankle Rocks','Mobility with support','2','10 each','ankle',['Hold wall or machine.','Move slowly.','Keep heel grounded.']]]},
{id:'thursday',tab:'Thu',day:'Thursday',subtitle:'Full Body Strength',focus:'Strong, stable full-body work without deadlifts.',stats:[['9','exercises'],['Moderate','effort'],['15 min','cool-down']],warm:[['Treadmill or Rower','5 minutes easy pace'],['Sit-to-Stand','10 easy reps'],['Arm Swings','20 relaxed swings'],['Light First Set','Start easy on first lift']],cool:['10-15 minute treadmill walk','10-15 minute Concept2 rower'],notes:[['Full body, not max day','Use moderate weight and clean reps.'],['No deadlifts','This day avoids movements she dislikes.']],ex:[['Leg Press','Comfortable range','3','10-12','legpress',['Set feet shoulder-width.','Lower to comfortable depth.','Push through heels and midfoot.']],['Machine Chest Press','Plate-loaded or selectorized','3','8-12','chest',['Adjust seat to mid-chest.','Press smoothly.','Return slowly.']],['Seated Row Machine','Posture builder','3','8-12','row',['Chest lifted.','Pull elbows back.','Avoid shrugging.']],['Goblet Squat to Bench','Bench target','3','10-12','squat',['Hold dumbbell at chest.','Sit hips back to bench.','No deep squat required.']],['Supported Step-Up','Low box and rail support','2','8-10 each','step',['Use low step.','Hold support.','Step down controlled.']],['Dumbbell Bench Press','Flat bench','2','10-12','bench',['Feet planted.','Lower to chest level.','Press smoothly.']],['Supported Split Squat','Or replace with sit-to-stand','2','8 each','lunge',['Hold rail or rack.','Small range is fine.','Skip if knee dislikes it.']],['Seated Hamstring Curl','Controlled accessory','2','12-15','curlleg',['Curl heels toward seat.','Pause briefly.','Return slowly.']],['Farmer Carry','Flat path only','3','30-40 yards','carry',['Stand tall.','Walk slowly.','Skip if area is crowded.']]]},
{id:'friday',tab:'Fri',day:'Friday',subtitle:'Accessory & Longevity',focus:'Joint health, posture, hips, arms, and light conditioning.',stats:[['9','accessories'],['Stable','machines'],['15-20 min','cool-down']],warm:[['Treadmill or Rower','5 minutes easy pace'],['Band Pull-Aparts','15 smooth reps'],['Shoulder Circles','10 each direction'],['Light First Set','Easy ramp up']],cool:['15-20 minute treadmill walk','15-20 minute Concept2 rower'],notes:[['Accessory day','Build the small pieces that keep the body moving well.'],['No balance challenge','Use seated, machine, or supported options.']],ex:[['Reverse Pec Deck','Rear delt machine','3','12-15','pecdeck',['Chest against pad.','Open arms wide.','Squeeze upper back.']],['Machine or Seated Lateral Raise','Side delts','3','12-15','lateral',['Stay seated or machine-based.','Raise to shoulder height.','No shrugging.']],['Chest-Supported Row','Machine or incline bench','3','10-12','row',['Chest supported.','Pull elbows back.','Return slowly.']],['Hip Abduction Machine','Outer hips','3','12-15','abduction',['Back supported.','Press knees outward.','Pause, then return slowly.']],['Hip Adduction Machine','Inner thighs','2','12-15','adduction',['Use comfortable range.','Control both directions.','Do not slam the stack.']],['Seated Calf Raise','Only calf exercise today','3','12-15','seatedcalf',['Rise onto balls of feet.','Pause briefly.','Lower slowly.']],['Back Extension Machine','Light posterior chain','2','10-12','backext',['Set comfortable range.','Move through hips.','Keep neck neutral.']],['Arm Superset','Curl plus triceps','2','12 each','arms',['Curl first.','Then triceps machine or pressdown.','Rest after both.']],['Optional Farmer Carry','Only if clear path','2','30 yards','carry',['Light to moderate dumbbells.','Walk tall and slow.','Skip if balance feels off.']]]}
];
let current=localStorage.getItem(STORE+'current')||suggestDay();const nav=document.getElementById('dayNav'),app=document.getElementById('app'),toast=document.getElementById('toast');
function suggestDay(){return ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'][new Date().getDay()].replace('sunday','monday').replace('saturday','friday')}
function setTheme(id){let t=themes[id]||themes.monday;document.documentElement.style.setProperty('--accent',t[0]);document.documentElement.style.setProperty('--accent2',t[1])}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function key(day,i,type){return STORE+day+'.ex.'+i+'.'+type}function noteKey(day){return STORE+day+'.notes'}function doneKey(day,i){return STORE+day+'.done.'+i}
function renderNav(){nav.innerHTML=program.map(d=>`<button class="tab ${d.id===current?'active':''}" data-day="${d.id}">${d.tab}<small>${d.subtitle.split(' ')[0]}</small></button>`).join('');nav.querySelectorAll('button').forEach(b=>b.onclick=()=>render(b.dataset.day))}
function render(id){current=id;localStorage.setItem(STORE+'current',id);setTheme(id);renderNav();let d=program.find(x=>x.id===id)||program[0];app.innerHTML=`<section class="section"><div class="day-title"><h2>${esc(d.day)}</h2><p>${esc(d.subtitle)}</p></div><div class="summary"><div>${esc(d.focus)}</div><div class="stats">${d.stats.map(s=>`<div class="stat"><b>${esc(s[0])}</b><span>${esc(s[1])}</span></div>`).join('')}</div></div></section>${warm(d)}${exercises(d)}${dailyNotes(d)}${finishPanel(d)}${historyPanel(d)}${coach(d)}`;wire();updateStats();window.scrollTo({top:0,behavior:'smooth'})}
function warm(d){return `<section class="section"><div class="head"><h3>Warm-Up</h3><span>Easy blood flow</span></div><div class="warm-grid">${d.warm.map(w=>`<div class="warm"><b>${esc(w[0])}</b><span>${esc(w[1])}</span></div>`).join('')}</div></section>`}
function exercises(d){return `<section class="section"><div class="head"><h3>Main Workout</h3><span>Weights, reps, and checkboxes auto-save</span></div><div class="exercise-list">${d.ex.map((e,i)=>card(d,i,e)).join('')}</div></section>`}
function card(d,i,e){let last=lastText(e[0]);return `<article class="exercise"><div class="pic">${graphic(e[4])}</div><div class="body"><div class="toprow"><div class="check"><input type="checkbox" data-k="${doneKey(d.id,i)}" ${localStorage.getItem(doneKey(d.id,i))==='1'?'checked':''}><div><h3 class="name">${i+1}. ${esc(e[0])}</h3><p class="sub">${esc(e[1])}</p></div></div><div class="rx"><div><b>${esc(e[2])}</b><span>sets</span></div><div><b>${esc(e[3])}</b><span>reps</span></div></div></div><ul class="cues">${e[5].map(c=>`<li>${esc(c)}</li>`).join('')}</ul><div class="track"><div class="field"><label>Weight used</label><input inputmode="decimal" placeholder="lbs" data-k="${key(d.id,i,'weight')}" value="${esc(localStorage.getItem(key(d.id,i,'weight'))||'')}"></div><div class="field"><label>Reps completed</label><input inputmode="numeric" placeholder="reps" data-k="${key(d.id,i,'reps')}" value="${esc(localStorage.getItem(key(d.id,i,'reps'))||'')}"></div><div class="last">${esc(last||'Last time: no saved workout yet')}</div></div></div></article>`}
function dailyNotes(d){return `<section class="section notes"><div class="head"><h3>Daily Notes</h3><span>knee, energy, anything useful</span></div><textarea data-k="${noteKey(d.id)}" placeholder="Example: knee felt good, increased leg press, energy was strong...">${esc(localStorage.getItem(noteKey(d.id))||'')}</textarea></section>`}
function finishPanel(d){return `<section class="section"><div class="head"><h3>Workout Completion</h3><span>save, email, or reset</span></div><div class="actions"><button class="btn" onclick="finishWorkout()">Finish Workout</button><button class="btn secondary" onclick="emailWorkout()">Email Today's Workout</button><button class="btn danger" onclick="clearToday()">Clear Today's Entries</button></div></section>`}
function coach(d){return `<section class="section"><div class="head"><h3>Coach Notes</h3><span>Simple rules</span></div><div class="warm-grid">${d.notes.map(n=>`<div class="warm"><b>${esc(n[0])}</b><span>${esc(n[1])}</span></div>`).join('')}</div><div class="warm-grid"><div class="warm"><b>Cool-down</b><span>${d.cool.map(esc).join(' or ')}</span></div><div class="warm"><b>Green light</b><span>Smooth movement, stable setup, no worsening pain later.</span></div><div class="warm"><b>Modify</b><span>Sharp pain, swelling, catching, or uncertain balance means reduce range or change the exercise.</span></div><div class="warm"><b>Progress</b><span>Add small amounts only when the movement feels clean and controlled.</span></div></div></section>`}
function historyPanel(d){let h=getHistory().filter(x=>x.dayId===d.id).slice(0,5);return `<section class="section"><div class="head"><h3>Recent History</h3><span>saved on this phone</span></div><div class="history">${h.length?h.map(x=>`<div class="hist-card"><b>${esc(x.date)} - ${esc(x.day)}</b><p>${esc(x.summary)}</p></div>`).join(''):`<div class="hist-card"><b>No saved workouts yet</b><p>Tap Finish Workout when she completes the day.</p></div>`}</div></section>`}
function wire(){document.querySelectorAll('[data-k]').forEach(el=>{if(el.type==='checkbox'){el.onchange=()=>{localStorage.setItem(el.dataset.k,el.checked?'1':'0');updateStats();show('Saved')}}else{el.oninput=()=>{localStorage.setItem(el.dataset.k,el.value);show('Saved')}}})}
function updateStats(){let d=program.find(x=>x.id===current);let done=d.ex.filter((_,i)=>localStorage.getItem(doneKey(d.id,i))==='1').length;document.getElementById('quickDone').textContent=Math.round(done/d.ex.length*100)+'%';document.getElementById('quickHistory').textContent=getHistory().length}
function buildSnapshot(){let d=program.find(x=>x.id===current);let date=new Date().toLocaleDateString();let items=d.ex.map((e,i)=>({name:e[0],weight:localStorage.getItem(key(d.id,i,'weight'))||'',reps:localStorage.getItem(key(d.id,i,'reps'))||'',done:localStorage.getItem(doneKey(d.id,i))==='1'}));let notes=localStorage.getItem(noteKey(d.id))||'';let done=items.filter(x=>x.done).length;return {id:Date.now(),date,dayId:d.id,day:d.day+' - '+d.subtitle,items,notes,summary:`${done}/${items.length} exercises checked complete. ${notes?('Notes: '+notes):'No notes entered.'}`}}
function finishWorkout(){let snap=buildSnapshot();let h=getHistory();h.unshift(snap);localStorage.setItem(STORE+'history',JSON.stringify(h.slice(0,100)));snap.items.forEach(it=>{if(it.weight||it.reps)localStorage.setItem(STORE+'last.'+it.name,JSON.stringify({weight:it.weight,reps:it.reps,date:snap.date}))});show('Workout saved');render(current)}
function emailWorkout(){let s=buildSnapshot();let lines=[`Jo's Program`,`${s.day}`,`Date: ${s.date}`,'',`Workout Inputs:`];s.items.forEach(it=>lines.push(`${it.done?'[x]':'[ ]'} ${it.name} - Weight: ${it.weight||'--'} | Reps: ${it.reps||'--'}`));lines.push('',`Daily Notes:`,s.notes||'--','',`Sent from Jo\'s Program v${VERSION}`);let subj=encodeURIComponent(`Jo's Program - ${s.day} - ${s.date}`);let body=encodeURIComponent(lines.join('\n'));window.location.href=`mailto:?subject=${subj}&body=${body}`}
function clearToday(){if(!confirm('Clear today\'s weight, reps, notes, and checkboxes?'))return;let d=program.find(x=>x.id===current);d.ex.forEach((_,i)=>['weight','reps'].forEach(t=>localStorage.removeItem(key(d.id,i,t)))||localStorage.removeItem(doneKey(d.id,i)));localStorage.removeItem(noteKey(d.id));show('Today cleared');render(current)}
function getHistory(){try{return JSON.parse(localStorage.getItem(STORE+'history')||'[]')}catch{return[]}}
function lastText(name){try{let x=JSON.parse(localStorage.getItem(STORE+'last.'+name)||'null');return x?`Last time: ${x.weight||'--'} lb | ${x.reps||'--'} reps (${x.date})`:''}catch{return''}}
function show(t){toast.textContent=t;toast.classList.add('show');clearTimeout(window.__toast);window.__toast=setTimeout(()=>toast.classList.remove('show'),900)}

render(current);
document.getElementById('finishBtn').onclick=finishWorkout;document.getElementById('emailBtn').onclick=emailWorkout;
if('serviceWorker'in navigator){navigator.serviceWorker.register('./service-worker.js').then(reg=>{reg.addEventListener('updatefound',()=>{let nw=reg.installing;nw&&nw.addEventListener('statechange',()=>{if(nw.state==='installed'&&navigator.serviceWorker.controller)document.getElementById('updateBox').classList.add('show')})})});navigator.serviceWorker.addEventListener('controllerchange',()=>location.reload())}
document.getElementById('updateBtn').onclick=()=>{navigator.serviceWorker.getRegistration().then(reg=>{if(reg&&reg.waiting)reg.waiting.postMessage({type:'SKIP_WAITING'});else location.reload()})}
